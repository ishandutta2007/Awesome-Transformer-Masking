<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="50%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#151828" />
    </linearGradient>

    <!-- Glowing Text Gradients -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#f5576c" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>

    <!-- Glow Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Ambient background glow blobs -->
  <circle cx="200" cy="100" r="150" fill="#4facfe" opacity="0.15" filter="url(#glow)" />
  <circle cx="1000" cy="300" r="180" fill="#f5576c" opacity="0.12" filter="url(#glow)" />

  <!-- Abstract Masking Matrix Diagram on the Right -->
  <g transform="translate(820, 80)">
    <!-- Main Matrix Grid Border -->
    <rect width="240" height="240" rx="12" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
    
    <!-- Matrix Cells (Lower triangular matrix representation) -->
    <!-- Row 1 -->
    <rect x="20" y="20" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" filter="url(#soft-glow)" />
    <rect x="75" y="20" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />
    <rect x="130" y="20" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />
    <rect x="185" y="20" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />

    <!-- Row 2 -->
    <rect x="20" y="75" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" />
    <rect x="75" y="75" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" filter="url(#soft-glow)" />
    <rect x="130" y="75" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />
    <rect x="185" y="75" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />

    <!-- Row 3 -->
    <rect x="20" y="130" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" />
    <rect x="75" y="130" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" />
    <rect x="130" y="130" width="40" height="40" rx="6" fill="#4facfe" fill-opacity="0.9" filter="url(#soft-glow)" />
    <rect x="185" y="130" width="40" height="40" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2,2" />

    <!-- Row 4 -->
    <rect x="20" y="185" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" />
    <rect x="75" y="185" width="40" height="40" rx="6" fill="#00f2fe" fill-opacity="0.8" />
    <rect x="185" y="185" width="40" height="40" rx="6" fill="#f5576c" fill-opacity="0.9" filter="url(#soft-glow)" />
    <rect x="130" y="185" width="40" height="40" rx="6" fill="#4facfe" fill-opacity="0.9" />

    <!-- Diagonal Highlight Line -->
    <line x1="10" y1="10" x2="230" y2="230" stroke="#f5576c" stroke-width="2" stroke-dasharray="4,4" filter="url(#soft-glow)" />
  </g>

  <!-- Typography / Content -->
  <!-- Badges Background Accent -->
  <path d="M 80 80 L 700 80 L 680 120 L 80 120 Z" fill="rgba(79, 172, 254, 0.1)" stroke="rgba(79, 172, 254, 0.3)" stroke-width="1" />
  
  <text x="95" y="106" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#00f2fe" letter-spacing="2">ARCHITECTURAL MECHANISMS</text>
  
  <!-- Main Title -->
  <text x="80" y="210" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="54" font-weight="900" fill="url(#text-grad)" filter="url(#soft-glow)">Awesome Transformer</text>
  <text x="80" y="275" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="54" font-weight="900" fill="url(#accent-grad)">Masking</text>

  <!-- Subtitle -->
  <text x="80" y="325" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="500" fill="#a0aec0" letter-spacing="0.5">Evolution, Variants, Types &amp; Hardware Implementations</text>

  <!-- Subtle connecting tech-lines -->
  <path d="M 80 350 L 500 350 L 520 370" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2" />
  <circle cx="520" cy="370" r="4" fill="#f5576c" />
</svg>
